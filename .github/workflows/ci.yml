name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libclang-dev protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libclang-dev protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libclang-dev protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libclang-dev protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
