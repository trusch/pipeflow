name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux release artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install PipeWire dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libspa-0.2-dev libclang-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_DIR="pipeflow-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "$ARCHIVE_DIR"
          cp target/release/pipeflow "$ARCHIVE_DIR/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$ARCHIVE_DIR/"
          cp assets/pipeflow.desktop "$ARCHIVE_DIR/"
          tar -C . -czf "$ARCHIVE_DIR.tar.gz" "$ARCHIVE_DIR"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pipeflow-*-x86_64-unknown-linux-gnu.tar.gz
